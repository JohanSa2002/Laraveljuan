services:

  # ── PHP-FPM Application ────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
    container_name: laravelutp_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - storage_data:/var/www/html/storage
      - sqlite_data:/var/www/html/database
    env_file:
      - .env.docker
    networks:
      - laravelutp

  # ── Nginx Web Server ───────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: laravelutp_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - laravelutp

  # ── Queue Worker ───────────────────────────────────────────────
  queue:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
    container_name: laravelutp_queue
    restart: unless-stopped
    working_dir: /var/www/html
    command: php artisan queue:work --sleep=3 --tries=3 --timeout=90
    volumes:
      - storage_data:/var/www/html/storage
      - sqlite_data:/var/www/html/database
    env_file:
      - .env.docker
    depends_on:
      - app
    networks:
      - laravelutp

volumes:
  storage_data:
  sqlite_data:

networks:
  laravelutp:
    driver: bridge
